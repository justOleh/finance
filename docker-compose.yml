services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - RECEIPT_PARSER_URL=http://receipt_parser:8001
    depends_on:
      - receipt_parser

  receipt_parser:
    build: ./receipt_parser
    ports:
      - "8001:8001"
    volumes:
      # Model weights are excluded from the image (see receipt_parser/.dockerignore)
      # and mounted from the host at the path expected by app/main.py.
      - ./receipt_parser/app/data/models:/app/app/data/models:ro

  frontend:
    build: ./frontend
    ports:
      - "8501:80"
    depends_on:
      - backend
