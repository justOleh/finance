services:
  backend:
    build: ./backend
    env_file:
      - ./envs/local.env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - receipt_parser

  receipt_parser:
    build: ./receipt_parser
    env_file:
      - ./envs/local.env
    ports:
      - "${RECEIPT_PARSER_PORT}:8001"
    volumes:
      # Model weights are excluded from the image (see receipt_parser/.dockerignore)
      # and mounted from the host at the path expected by app/main.py.
      - ./receipt_parser/app/data/models:/app/app/data/models:ro

  frontend:
    build:
      context: ./frontend
      args:
        # Vite bakes VITE_* vars into the bundle at build time.
        VITE_BACKEND_URL: "${VITE_BACKEND_URL-}"
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
