
services:
  receipt-parser:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-finance-receipt-parser:latest
    container_name: receipt-parser
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - ./app:/app/app
      - ../data/receipts:/app/app/data/receipts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - my-finance-network

networks:
  my-finance-network:
    driver: bridge

